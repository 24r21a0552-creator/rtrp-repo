<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cancel Booking</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9f9f9;
      }
      .header {
        background-color: #06f4e8;
        color: white;
        padding: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header .title {
        font-size: 2.5rem;
        font-weight: bold;
      }
      nav {
        background-color: #0aeed0;
        display: flex;
        justify-content: center;
        padding: 20px 0;
      }
      nav a {
        color: white;
        text-decoration: none;
        margin: 0 20px;
        font-size: 1.5rem;
        padding: 15px 25px;
        border-radius: 5px;
      }
      nav a:hover {
        background-color: #575757;
      }
      .container {
        max-width: 600px;
        margin: 20px auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        padding: 20px;
      }
      .title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        font-weight: bold;
        display: block;
        margin-bottom: 0.5rem;
      }
      select,
      input,
      button {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
      button {
        background-color: #01f4f4;
        color: white;
        font-size: 1.5rem;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #08faf2;
      }
      .booking-summary {
        margin-top: 1.5rem;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">MLRIT Sports</div>
      <nav>
        <a href="#">Home</a>
        <a href="/achv1.html">Sports</a>
        <a href="/booknow.html">Book Now</a>
        <a href="/contact.html">Contact</a>
        <a href="">About Us</a>
      </nav>
    </div>
    <div class="container">
      <h1>Cancel Booking</h1>
      <div class="form-group">
        <label for="rollno">Roll Number</label>
        <input type="text" id="rollno" placeholder="Enter your roll number" />
      </div>
      <div class="form-group">
        <label for="sport">Choose Sport</label>
        <select id="sport">
          <option value="football">Football</option>
          <option value="cricket">Cricket</option>
          <option value="badminton">Badminton</option>
          <option value="tennis">Tennis</option>
          <option value="basketball">Basketball</option>
          <option value="volleyball">Volleyball</option>
        </select>
      </div>
      <div class="form-group">
        <label for="date">Date</label>
        <input type="date" id="date" />
      </div>
      <button id="cancelBtn">Cancel Booking</button>

      <div id="summary" class="booking-summary"></div>
    </div>

    <script>
      document.getElementById("cancelBtn").addEventListener("click", () => {
        const rollno = document.getElementById("rollno").value.trim();
        const sport = document.getElementById("sport").value;
        const date = document.getElementById("date").value;

        if (!rollno || !sport || !date) {
          alert(
            "Please fill all mandatory fields (Roll Number, Sport, and Date)!"
          );
          return;
        }

        const cancellationData = {
          roll_no: rollno,
          sport: sport,
          date: date,
        };

        fetch("http://localhost:3000/CancelBooking", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(cancellationData),
        })
          .then((response) => {
            if (response.status === 202) {
              return response.text();
            } else {
              throw new Error("Failed to cancel booking");
            }
          })
          .then((data) => {
            const summary = `
                    <h3>Cancellation Summary</h3>
                    <p><strong>Roll Number:</strong> ${rollno}</p>
                    <p><strong>Sport:</strong> ${sport}</p>
                    <p><strong>Date:</strong> ${date}</p>
                    <p>Your booking has been successfully cancelled.</p>
                `;
            document.getElementById("summary").innerHTML = summary;
          })
          .catch((error) => {
            alert(error.message);
          });
      });
    </script>
  </body>
</html>
