<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sports Booking</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f9f9f9;
      }
      .header {
        background-color: #06f4e8;
        color: white;
        padding: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header .title {
        font-size: 2.5rem;
        font-weight: bold;
      }
      nav {
        background-color: #0aeed0;
        display: flex;
        justify-content: center;
        padding: 20px 0;
      }
      nav a {
        color: white;
        text-decoration: none;
        margin: 0 20px;
        font-size: 1.5rem;
        padding: 15px 25px;
        border-radius: 5px;
      }
      nav a:hover {
        background-color: #575757;
      }
      .container {
        max-width: 600px;
        margin: 20px auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        padding: 20px;
      }
      .title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      label {
        font-weight: bold;
        display: block;
        margin-bottom: 0.5rem;
      }
      select,
      input,
      button {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }
      button {
        background-color: #01f4f4;
        color: white;
        font-size: 1.5rem;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background-color: #08faf2;
      }
      .booking-summary {
        margin-top: 1.5rem;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="title">MLRIT Sports</div>
      <nav>
        <a href="#">Home</a>
        <a href="/achv1.html">Sports</a>
        <a href="/booknow.html">Book Now</a>
        <a href="/cancelbooking.html">Cancel Booking</a>
        <a href="/contact.html">Contact</a>
        <a href="">About Us</a>
      </nav>
    </div>

    <div class="container" id="booknow">
      <div class="title">Book Your Favorite Sport</div>
      <div class="form-group">
        <label for="rollno">Roll Number</label>
        <input type="text" id="rollno" placeholder="Enter your roll number" />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label for="department">Department</label>
        <select id="department">
          <option value="cse">CSE</option>
          <option value="it">IT</option>
          <option value="mech">Mechanical</option>
          <option value="civil">Civil</option>
          <option value="eee">EEE</option>
          <option value="csds">CS-DS</option>
          <option value="csit">CSIT</option>
          <option value="cs-aiml">CS-AIML</option>
          <option value="cse-cs">CS-CYBERSECURITY</option>
        </select>
      </div>
      <div class="form-group">
        <label for="sport">Choose Sport</label>
        <select id="sport">
          <option value="football">Football</option>
          <option value="cricket">Cricket</option>
          <option value="badminton">Badminton</option>
          <option value="volleyball">VolleyBall</option>
          <option value="tennis">Tennis</option>
          <option value="chess">Chess</option>
          <option value="carroms">carroms</option>
          <option value="8pool">8-Pool</option>
        </select>
      </div>
      <div class="form-group">
        <label for="date">Choose Date</label>
        <input type="date" id="date" />
      </div>
      <div class="form-group">
        <label for="time">Choose Time</label>
        <select id="time">
          <option value="9:00 AM - 10:00 AM">9:00 AM - 10:00 AM</option>
          <option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
          <option value="1:00 PM - 2:00 PM">1:00 PM - 2:00 PM</option>
          <option value="2:00 PM - 3:00 PM">2:00 PM - 3:00 PM</option>
          <option value="3:00 PM - 4:00 PM">3:00 PM - 4:00 PM</option>
          <option value="4:00 PM - 5:00 PM">4:00 PM - 5:00 PM</option>
          <option value="5:00 PM - 6:00 PM">5:00 PM - 6:00 PM</option>
        </select>
      </div>
      <div class="form-group">
        <label for="venue">Choose Venue</label>
        <select id="venue">
          <option value="cricket ground">MLR Cricket Ground</option>
          <option value="indoor">Indoor Stadium</option>
        </select>
      </div>
      <button id="bookBtn">Book Now</button>

      <div id="summary" class="booking-summary"></div>
    </div>

    <script>
      document.getElementById("bookBtn").addEventListener("click", () => {
        const rollno = document.getElementById("rollno").value.trim();
        const email = document.getElementById("email").value.trim();
        const department = document.getElementById("department").value;
        const sport = document.getElementById("sport").value;
        const date = document.getElementById("date").value;
        const time = document.getElementById("time").value;
        const venue = document.getElementById("venue").value;

        if (!rollno || !email || !date) {
          alert(
            "Please fill all mandatory fields (Roll Number, Email, and Date)!"
          );
          return;
        }

        const bookingData = {
          roll_no: rollno,
          email: email,
          department: department,
          sport: sport,
          date: date,
          time: time,
          venue: venue,
        };

        fetch("http://localhost:3000/CreateBooking", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(bookingData),
        })
          .then((response) => {
            if (response.status === 202) {
              return response.text();
            } else if (response.status === 423) {
              throw new Error("Already Booking exists for this student");
            } else {
              throw new Error("Failed to create booking");
            }
          })
          .then((data) => {
            const summary = `
                    <h3>Booking Summary</h3>
                    <p><strong>Roll Number:</strong> ${rollno}</p>
                    <p><strong>Email:</strong> ${email}</p>
                    <p><strong>Department:</strong> ${department}</p>
                    <p><strong>Sport:</strong> ${sport}</p>
                    <p><strong>Date:</strong> ${date}</p>
                    <p><strong>Time:</strong> ${time}</p>
                    <p><strong>Venue:</strong> ${venue}</p>
                    <p>Thank you for booking with us!</p>
                `;
            document.getElementById("summary").innerHTML = summary;
          })
          .catch((error) => {
            alert(error.message);
          });
      });
    </script>
  </body>
</html>
